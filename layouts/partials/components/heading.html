{{/*
    Usage:
    {{ partial "components/heading.html" . }}

    Self-contained section med balevikit heading-mønster.
*/}}

<section class="bg-background-tinted">
    <div class="container">
        <h1 class="text-3xl sm:text-5xl font-semibold leading-snug tracking-tight mt-0 mb-6 text-gray-900">
            {{.Page.Title}}
        </h1>
        {{ with .Page.Params.description }}
            <p class="text-xl leading-normal text-gray-700 max-w-2xl">
                {{.}}
            </p>
        {{ end }}
    </div>
</section>
