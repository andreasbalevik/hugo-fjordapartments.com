{{/*
    Usage:
    {{ partial "components/heading.html" . }}

    Self-contained section med balevikit heading-mønster.
    Bruker background-tinted og semantiske fargetokens.
*/}}

<section class="bg-background-tinted">
    <div class="container">
        <h1 class="text-3xl sm:text-4xl font-medium leading-tight tracking-tight mt-0 mb-6 text-fg">
            {{.Page.Title}}
        </h1>
        {{ with .Page.Params.description }}
            <p class="text-lg leading-normal text-fg-muted max-w-2xl">
                {{.}}
            </p>
        {{ end }}
    </div>
</section>
