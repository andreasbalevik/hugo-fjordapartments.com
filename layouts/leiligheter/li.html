<article itemscope itemtype="http://schema.org/Product"
    class="bg-surface border border-border-subtle rounded-ds-lg shadow-ds-sm
           grid grid-cols-1 xl:grid-cols-2 overflow-hidden
           hover:shadow-ds-md transition-all duration-300">

    <div class="overflow-hidden min-h-[300px] xl:min-h-[400px]">
        {{ partial "components/images/carousel" (dict "images" .Params.images "preset" "card") }}
    </div>

    <div class="p-8 md:p-12 flex flex-col justify-center gap-4">

        <h2 itemprop="name"
            class="text-2xl font-semibold leading-snug mt-0 mb-0 text-gray-900">
            {{.Title}}
        </h2>

        {{ if .Params.details }}
        <div class="flex flex-wrap gap-2">
            {{ range .Params.details }}
                <span class="inline-flex items-center bg-background-tinted text-primary
                             text-sm font-medium px-3 py-1 rounded-ds-md border border-border-subtle">
                    {{.}}
                </span>
            {{ end }}
        </div>
        {{ end }}

        <p class="text-base leading-normal text-gray-700">
            {{.Params.desc}}
        </p>

        <hr class="my-4: sm:my-6 text-gray-300">

        <a href="{{.Params.link}}"
            class="inline-flex items-center gap-2 text-base font-semibold
                   bg-primary hover:bg-primary-hover active:bg-primary-active
                   text-primary-fg px-6 py-3 rounded-ds-lg shadow-ds-sm
                   hover:shadow-ds-md transition-all duration-300 w-fit
                   focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-focus">
            Airbnb — {{.Title}}
            <i data-lucide="arrow-right" class="w-4 h-4" aria-hidden="true"></i>
        </a>

    </div>
</article>
