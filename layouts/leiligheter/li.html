<article itemscope itemtype="http://schema.org/Product"
    class="bg-white border border-primary/15 rounded-lg shadow-sm
           grid grid-cols-1 xl:grid-cols-2
           hover:shadow transition-all duration-300">

    <div class="overflow-hidden min-h-[300px] xl:min-h-[400px] rounded-t-lg xl:rounded-tr-none xl:rounded-l-lg xl:rounded-bl-lg">
        {{ partial "components/images/carousel" (dict "images" .Params.images "preset" "card") }}
    </div>

    <div class="p-8 md:p-12 flex flex-col justify-center gap-4 rounded-b-lg xl:rounded-b-none xl:rounded-tr-lg xl:rounded-br-lg">

        <h2 itemprop="name"
            class="text-2xl md:text-3xl font-medium leading-[1.2] tracking-[-0.015em] text-balance mt-0 mb-0 text-gray-900">
            {{.Title}}
        </h2>

        {{ if .Params.details }}
        <div class="flex flex-wrap gap-2">
            {{ range .Params.details }}
                <span class="inline-flex items-center bg-primary/8 text-primary
                             text-sm font-medium px-3 py-1 rounded-md border border-primary/20">
                    {{.}}
                </span>
            {{ end }}
        </div>
        {{ end }}

        <p class="text-base leading-normal text-gray-700">
            {{.Params.desc}}
        </p>

        <hr class="my-4 sm:my-6 border-primary/15">

        <a href="{{.Params.link}}"
            class="inline-flex items-center gap-2 text-base font-semibold
                   bg-primary hover:bg-primary/90 active:bg-primary/80
                   text-white px-6 py-3 rounded-lg shadow-sm
                   hover:shadow transition-all duration-300 w-fit
                   focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">
            Airbnb — {{.Title}}
            <i data-lucide="arrow-right" class="w-4 h-4" aria-hidden="true"></i>
        </a>

    </div>
</article>
