{{ define "main" }}

{{ partial "components/heading.html" . }}

<section class="bg-background">
    <div class="container">
        <div class="max-w-3xl flex flex-col gap-4 md:gap-6">
            {{ range .Page.Params.faq }}
            <article class="bg-surface border border-border-subtle rounded-ds-lg shadow-ds-sm p-6 md:p-8">
                <h3 class="flex items-center gap-4 text-lg font-medium leading-tight mt-0 mb-4 text-fg">
                    <span class="flex items-center justify-center w-9 h-9 rounded-ds-md bg-background-tinted text-primary shrink-0">
                        <i data-lucide="circle-help" class="w-5 h-5" aria-hidden="true"></i>
                    </span>
                    {{.title}}
                </h3>
                <div class="text-base leading-relaxed text-fg-muted
                            [&_li]:list-disc [&_li]:ml-6 [&_li]:mt-1
                            [&_b]:font-medium [&_b]:text-fg
                            [&_a]:text-primary [&_a]:underline [&_a]:underline-offset-2">
                    {{.content | safeHTML}}
                </div>
            </article>
            {{ end }}
        </div>
    </div>
</section>

{{ end }}
